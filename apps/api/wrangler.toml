name = "blinds-nisa-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
# nodejs_compat: @react-pdf/renderer needs Node Buffer/stream shims
compatibility_flags = ["nodejs_compat"]

[triggers]
# 06:00 UTC — auto-expire stale estimates.
# 14:00 UTC — customer emails at 10 AM Toronto (EDT; 9 AM during EST):
#             day-before appointment/installation reminders + review
#             requests 2 days after an order is marked installed.
crons = ["0 6 * * *", "0 14 * * *"]

[vars]
ENVIRONMENT = "development"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# RESEND_API_KEY
# APP_URL
# RESEND_FROM       (e.g. "Blinds Nisa <estimates@blindsnisa.com>")
# RESEND_REPLY_TO   (e.g. "info@blindsnisa.com")
# ETRANSFER_WEBHOOK_SECRET  (shared with the Gmail Apps Script)
